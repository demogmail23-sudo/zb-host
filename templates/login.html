<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZB-HOST | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-[400px] bg-slate-900/50 backdrop-blur-xl p-10 rounded-[3rem] border border-white/5 text-center shadow-2xl">
        <div class="w-16 h-16 bg-indigo-600/20 rounded-2xl flex items-center justify-center mx-auto mb-6 border border-indigo-500/30">
            <span class="text-2xl text-indigo-400 font-black italic">Z</span>
        </div>
        <h1 class="text-2xl font-black text-white italic uppercase mb-2">ACCESS PANEL</h1>
        <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-8">Enter Commander Passkey</p>

        {% if error %}
        <div class="bg-red-500/10 text-red-400 p-3 rounded-xl mb-6 text-[10px] font-black uppercase border border-red-500/20">
            {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="POST" class="space-y-4">
            <input type="text" name="username" placeholder="USERNAME" required class="w-full py-4 px-6 bg-black/40 border border-white/10 rounded-2xl text-white text-sm focus:border-indigo-500 outline-none transition-all">
            <input type="password" name="password" placeholder="PASSWORD" required class="w-full py-4 px-6 bg-black/40 border border-white/10 rounded-2xl text-white text-sm focus:border-indigo-500 outline-none transition-all">
            <button type="submit" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 rounded-2xl text-white font-black uppercase tracking-widest text-[10px] transition-all shadow-lg shadow-indigo-500/20">INITIALIZE SYSTEM</button>
        </form>
        <p class="mt-8 text-slate-500 text-[10px] font-black uppercase">New Commander? <a href="/signup" class="text-indigo-400">Register Node</a></p>
    </div>
</body>
</html>
